<div class="container-block">
  <div class="title-row">
    <h3>
      {{ promo && promoID ? promo.title : "Новая реклама" }}
    </h3>
    <div class="img-del" *ngIf="promoID">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        data-name="Layer 1"
        viewBox="0 0 24 24"
        (click)="openDelTemplate()"
        *ngIf="!isDelete"
      >
        <path
          d="M17 4V2a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v2H2v2h2v15a3 3 0 0 0 3 3h10a3
         3 0 0 0 3-3V6h2V4Zm-6 13H9v-6h2Zm4 0h-2v-6h2Zm0-13H9V2h6Z"
          fill="white"
        />
      </svg>
    </div>
  </div>

  <app-delete-template *ngIf="isDelete" [elemIn]="elem"></app-delete-template>

  <div [class]="isDelete ? 'blur' : ''">
    <form [formGroup]="form">
      <div class="container-form">
        <div class="row">
          <div class="input-field col s6">
            <label class="active" for="title">Название</label>
            <input
              id="title"
              type="text"
              formControlName="title"
              [ngClass]="{
                invalid:
                  form.get('title')?.invalid && form.get('title')?.touched,
              }"
              (keyup)="checkTitlePromo()"
            />
          </div>
        </div>

        <span class="error" *ngIf="isError"> *Название уже занято </span>
        <span
          class="error"
          *ngIf="
            form.get('title')?.hasError('required') &&
            form.get('title')?.touched
          "
          >*Введите название
        </span>

        <div class="description-block">
          <label
            for="textarea"
            style="padding-left: 10px"
            [ngClass]="{
              invalid:
                form.get('description')?.invalid &&
                form.get('description')?.touched,
            }"
            >Описание</label
          >
          <textarea
            id="textarea"
            maxlength="300"
            [ngClass]="{
              invalid:
                form.get('description')?.invalid &&
                form.get('description')?.touched,
            }"
            placeholder="Текст рекламного предложения"
            formControlName="description"
          ></textarea>
        </div>

        <div class="row">
          <div class="input-field col s6">
            <label class="active" for="link">Ссылка</label>
            <input
              id="link"
              type="text"
              formControlName="link"
              [ngClass]="{
                invalid: form.get('link')?.invalid && form.get('link')?.touched,
              }"
            />
          </div>
        </div>

        <div class="img-block">
          <label for="promo-image">Выберите изображение </label>
          <div class="img-group">
            <input
              id="promo-image"
              type="file"
              class="dn"
              formControlName="image"
              #inputImg
              (change)="uploadImg($event)"
            />
            <img
              (click)="inputImg.click()"
              [class.dn]="isDelete"
              [ngClass]="
                promo?.imgSrc || uploadedImgLink() ? 'img-true' : 'img-icon'
              "
              [src]="
                uploadedImgLink() ||
                promo?.imgSrc ||
                '../assets/icons/add-photo.png'
              "
              alt="image"
            />
          </div>
        </div>

        <div class="btn-group">
          <button
            class="btn-cancel"
            extended=""
            mat-fab
            [disabled]="isDelete"
            (click)="openPromosPage()"
          >
            Отмена
          </button>
          <button
            type="submit"
            class="btn-save"
            extended=""
            mat-fab
            [disabled]="form.invalid || isError || isDelete"
            (click)="onSubmit()"
          >
            Сохранить
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
